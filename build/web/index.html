<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Dextrade is a high-performance decentralized matching engine and sovereign Web3 trading terminal featuring microsecond execution and cold custody protection.">
  <meta name="keywords" content="dextrade, copytrading, match engine, cold custody, decentralized trading, web3, crypto terminal">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Dextrade Terminal">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>Dextrade | High-Performance Sovereign Web3 Terminal</title>
  <link rel="manifest" href="manifest.json">

  <!-- Let Flutter pick the fastest renderer (skwasm / canvaskit) for this device -->
  <!-- Premium Glassmorphic Loading Screen CSS -->
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@800&family=Space+Grotesk:wght@500;700&display=swap');
    
    body {
      background-color: #000000;
      margin: 0;
      padding: 0;
      overflow: hidden;
      height: 100vh;
      width: 100vw;
    }
    
    #loading-indicator {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: #000000;
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 999999;
      font-family: 'Space Grotesk', sans-serif;
      transition: opacity 0.5s ease;
    }
    
    .loader-container {
      text-align: center;
      position: relative;
      padding: 48px;
      border-radius: 28px;
      background: rgba(255, 255, 255, 0.01);
      border: 1px solid rgba(255, 255, 255, 0.04);
      box-shadow: 0 0 50px rgba(0, 242, 254, 0.03);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      overflow: hidden;
      width: 280px;
    }
    
    .loader-container::before {
      content: '';
      position: absolute;
      top: -50%;
      left: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle, rgba(0, 242, 254, 0.06) 0%, transparent 60%);
      animation: rotateGrad 12s linear infinite;
      z-index: -1;
    }
    
    .spinner {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.03);
      border-top: 2px solid #00f2fe;
      border-right: 2px solid #4facfe;
      animation: spin 0.8s cubic-bezier(0.68, -0.35, 0.27, 1.35) infinite;
      margin: 0 auto 28px auto;
      box-shadow: 0 0 20px rgba(0, 242, 254, 0.15);
    }
    
    .logo-text {
      font-family: 'Orbitron', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 5px;
      color: #ffffff;
      margin-bottom: 12px;
      text-shadow: 0 0 12px rgba(255, 255, 255, 0.1);
    }
    
    .status-text {
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255, 255, 255, 0.35);
      text-transform: uppercase;
      font-weight: 700;
      animation: pulse 1.8s ease-in-out infinite;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes rotateGrad {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 0.35; }
      50% { opacity: 0.7; }
    }
  </style>
</head>
<body>
  <!-- Ultra-Premium Startup Loader -->
  <div id="loading-indicator">
    <div class="loader-container">
      <div class="spinner"></div>
      <div class="logo-text">DEXTRADE</div>
      <div class="status-text">Connecting Engine</div>
    </div>
  </div>

  <script src="flutter_bootstrap.js" async></script>
  <script>
    window.addEventListener('flutter-first-frame', function() {
      var loader = document.getElementById('loading-indicator');
      if (loader) {
        loader.style.opacity = '0';
        setTimeout(function() { loader.remove(); }, 500);
      }
    });
  </script>
</body>
</html>
